<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Testimonials</title>
<style>
/* Add these styles at the top of your CSS */
html, body {
    height: 100%;
    margin: 0;
}

body {
    font-family: Arial;
    background: #f9f9f9;
    padding: 20px;
    display: flex;
    flex-direction: column;
    min-height: 100vh; /* Use viewport height */
}

/* Wrapper for main content */
.main-content {
    flex: 1 0 auto; /* This makes content area grow */
}

h2 { text-align: center; }
#reviewsContainer { 
    display: flex; 
    flex-wrap: wrap; 
    justify-content: center; 
    gap: 20px; 
    margin-top: 20px;
    margin-bottom: 20px; /* Add space before footer */
}
.review-card { background: #fff; padding: 15px; border-radius: 10px; width: 250px; box-shadow: 0 2px 6px rgba(0,0,0,0.1); }
.review-card img { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; }
.review-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.review-name { font-weight: bold; }
.review-company { font-size: 0.9rem; color: #666; }
.review-text { margin: 5px 0; }
.review-rating { color: #f5a623; font-weight: bold; }

/* Footer styles */
footer {
    background: #333;
    color: white;
    text-align: center;
    padding: 20px;
    margin-top: auto; /* Pushes footer to bottom */
    flex-shrink: 0; /* Prevents footer from shrinking */
    width: 100%;
    box-sizing: border-box;
}

/* Optional: Add some spacing and styling to footer content */
.footer-content {
    max-width: 800px;
    margin: 0 auto;
}

.footer-links {
    margin-top: 10px;
}

.footer-links a {
    color: #f5a623;
    text-decoration: none;
    margin: 0 10px;
}

.footer-links a:hover {
    text-decoration: underline;
}

.copyright {
    margin-top: 15px;
    font-size: 0.9rem;
    color: #ccc;
}
</style>
</head>
<body>

<div class="main-content">
    <h2>What Our Clients Say</h2>
    <div id="reviewsContainer"></div>
</div>

<!-- Add this footer section -->
<footer>
    <div class="footer-content">
        <p>Your Company Name &copy; 2024</p>
        <div class="footer-links">
            <a href="#">Privacy Policy</a>
            <a href="#">Terms of Service</a>
            <a href="#">Contact Us</a>
        </div>
        <div class="copyright">
            <p>All testimonials are from verified clients</p>
        </div>
    </div>
</footer>

<script>
// STEP 1: Define the callback function FIRST
function handleReviews(reviews) {
  const container = document.getElementById('reviewsContainer');
  container.innerHTML = '';

  if (!reviews.length) {
    container.innerHTML = '<p>No testimonials yet.</p>';
    return;
  }

  reviews.forEach(review => {
    const div = document.createElement('div');
    div.className = 'review-card';
    div.innerHTML = `
      <div class="review-header">
        <img src="${review.Avatar || 'https://via.placeholder.com/50'}" alt="${review.Name}">
        <div>
          <div class="review-name">${review.Name}</div>
          <div class="review-company">${review.Company}</div>
        </div>
      </div>
      <div class="review-text">${review.Text}</div>
      <div class="review-rating">Rating: ${review.Rating}</div>
    `;
    container.appendChild(div);
  });
}

// STEP 2: Load the Web App via JSONP
const script = document.createElement('script');
script.src = 'https://script.google.com/macros/s/AKfycbwHNQvf-l4eT99dNaxp7O5fjMQc2WOePYAi7hf2kxhmxwEvxGDxi3zmgiiPzO9T14s7hg/exec'; // <-- replace with your /exec URL
document.body.appendChild(script);
</script>

</body>
</html>
